name: Đóng gói và Đẩy Image Docker lên Hub   # Tên quy trình CI/CD

on:
  push:
    branches: [ "main" ]                    

jobs:
  build_va_push_docker:
    runs-on: ubuntu-latest                   # Mượn máy ảo Ubuntu của GitHub để chạy

    steps:
      - name: Bước 1 - Lấy code từ Github
        uses: actions/checkout@v4

      - name: Bước 2 - Thiết lập môi trường Build siêu tốc  
        uses: docker/setup-buildx-action@v3

      - name: Bước 3 - Đăng nhập vào Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Bước 4 - Đóng gói và Đẩy Image lên mạng
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/portfolio-app:latest

      - name: Triển khai lên DevOps Classroom
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
        run: |
          REPO="truongvuminhvan/portfolio-app"
          CONTAINER_PORT=8080
          RESPONSE=$(curl -sS -g -w "\n%{http_code}" -X POST "${DEPLOY_URL}?repo=${REPO}&tag=latest&slot=7&container_port=${CONTAINER_PORT}&strict_container_port=0")
          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy that bai."
            echo "::group::Chi tiet webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          echo "Deploy thanh cong."
          echo "::group::Chi tiet webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
