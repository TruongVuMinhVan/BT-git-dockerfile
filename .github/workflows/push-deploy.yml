name: Đóng gói và Đẩy Image Docker lên Hub   # Tên quy trình CI/CD

on:
  push:
    branches: [ "main" ]                    

jobs:
  build_va_push_docker:
    runs-on: ubuntu-latest                   # Mượn máy ảo Ubuntu của GitHub để chạy

    steps:
      - name: Bước 1 - Lấy code từ Github
        uses: actions/checkout@v6.0.2            

      - name: Bước 2 - Thiết lập môi trường Build siêu tốc  
        uses: docker/setup-buildx-action@v4.0.0  # Cài đặt công cụ đóng gói của Docker

      - name: Bước 3 - Đăng nhập vào Docker Hub
        uses: docker/login-action@v4.0.0       # Action Đăng nhập Docker Hub
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Bước 4 - Đóng gói và Đẩy Image lên mạng
        uses: docker/build-push-action@v7.0.0    # Action Đóng gói & Đẩy Image
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/portfolio-app:latest

      - name: Triển khai lên DevOps Classroom
        run: |
          REPO="github.com/truongvuminhvan"
          CONTAINER_PORT=80
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=5&container_port=$CONTAINER_PORT")
          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
            echo "::group::Chi tiết webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          echo "Deploy thành công."
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
