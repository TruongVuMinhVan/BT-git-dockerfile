<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
    <div id="skillModal" class="modal-overlay" style="display: none;" th:fragment="skillModal">
        <div class="modal-content ide-theme">
            <div class="modal-header">
                <h3><i class="fas fa-plus-square"></i> <span id="skillModalTitle">Add New Skill</span></h3>
                <button class="close-modal" onclick="closeSkillModal()"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="modal-body" style="display: flex; gap: 20px;">
                <!-- Left: Input Form -->
                <div class="modal-left" style="flex: 2;">
                    <div class="input-group">
                        <label>Title</label>
                        <input type="hidden" id="skillInputId">
                        <input type="text" id="skillInputTitle" placeholder="e.g. Web & Mobile Dev">
                    </div>
                    <div class="input-group">
                        <label>Content</label>
                        <textarea id="skillInputContent" rows="4" placeholder="e.g. Next.js, React, and Flutter apps..."></textarea>
                    </div>
                </div>
                
                <!-- Right: Icon Selector -->
                <div class="modal-right" style="flex: 1; border-left: 1px solid var(--border-color); padding-left: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                    <label style="align-self: flex-start; margin-bottom: 10px; color: var(--text-secondary); font-size: 0.85rem; font-family: var(--font-mono);">Icon Selector</label>
                    
                    <div class="icon-selector" style="display: flex; align-items: center; gap: 15px;">
                        <button class="icon-nav" onclick="prevSkillIcon()"><i class="fas fa-chevron-left"></i></button>
                        <div class="selected-icon" style="font-size: 3rem; color: var(--accent-cyan); width: 60px; text-align: center;">
                            <i id="skillCurrentIcon" class="fas fa-server"></i>
                        </div>
                        <button class="icon-nav" onclick="nextSkillIcon()"><i class="fas fa-chevron-right"></i></button>
                    </div>
                    
                    <div id="skillIconName" style="margin-top: 15px; color: var(--text-muted); font-family: var(--font-mono); font-size: 0.8rem;">fa-server</div>
                    
                    <!-- Hidden input to store chosen icon text -->
                    <input type="hidden" id="skillInputValue" value="fa-server">
                </div>
            </div>
            
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeSkillModal()">Cancel</button>
                <button class="btn-save" onclick="saveSkill()"><i class="fas fa-save"></i> Save</button>
            </div>
        </div>
    </div>
</body>
</html>
