<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <section id="skills" class="section fade-in" th:fragment="skills">
        <div class="section-header" style="display: flex; align-items: center; gap: 15px; margin-bottom: 30px;">
            <div class="section-icon"><i class="fas fa-code"></i></div>
            <h2>_skills</h2>
            <button class="crud-btn btn-add" title="Thêm mới" onclick="openSkillModal()" style="background: rgba(0, 212, 255, 0.1); border: 1px solid var(--accent-cyan); color: var(--accent-cyan); width: 28px; height: 28px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;"><i class="fas fa-plus"></i></button>
            <div class="section-line" style="flex: 1; height: 1px; background: var(--border-color);"></div>
        </div>
        <div class="skills-grid" id="skillsGridContainer">
            <!-- Dynamic Data from MySQL will be injected here via JavaScript -->
            <div style="grid-column: 1 / -1; text-align: center; color: var(--text-muted); padding: 50px 0;">
                <i class="fas fa-circle-notch fa-spin" style="font-size: 2rem; margin-bottom: 15px; color: var(--accent-cyan);"></i>
                <p>Loading database connect...</p>
            </div>
        </div>
    </section>
</body>
</html>
